server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # ✅ 핵심: 리액트 라우팅(SPA)을 위해 추가
        # 브라우저가 /dashboard로 접속해도 index.html을 먼저 읽게 하여 404를 방지합니다.
        try_files $uri $uri/ /index.html;
    }

    # API 요청을 백엔드로 프록시 (선택 사항이나 권장)
    # 프론트엔드에서 /api/... 로 요청하면 백엔드로 전달해줍니다.
    location /api/ {
        proxy_pass http://carrot-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}