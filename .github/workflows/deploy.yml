spring:
  profiles:
    active: prod # 기본 실행 프로필을 운영(prod)으로 설정

---
# ----------------------------------------------------------------
# 운영 환경 (Production) 설정
# ----------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    # SSL 관련 파라미터를 추가하여 RDS 보안 정책에 대응합니다.
    url: jdbc:mariadb://${RDS_HOSTNAME}:3306/restock_db?characterEncoding=UTF-8&useSSL=true&trustServerCertificate=true
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        # DB 연결 성공 후 Dialect 판별 에러를 방지하기 위해 명시합니다.
        dialect: org.hibernate.dialect.MariaDBDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    stack:
      auto: false

ai:
  google:
    gemini:
      api-key: ${AI_GOOGLE_GEMINI_API_KEY}

file:
  upload-dir: s3://${AWS_S3_BUCKET}/uploads
