name: Deploy to Amazon EC2 with CodeDeploy
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. AWS 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2

      # 2. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # 3. Docker 이미지 빌드 및 ECR 푸시
      - name: Build and Push to ECR
        run: |
          # 백엔드 빌드
          docker build -t ${{ steps.login-ecr.outputs.registry }}/carrot-backend ./backend
          docker push ${{ steps.login-ecr.outputs.registry }}/carrot-backend
          
          # 프론트엔드 빌드 (✅ 도메인 주소로 빌드 인자 수정)
          docker build \
            --build-arg REACT_APP_API_URL=http://yellow.it.kr:8080 \
            --build-arg REACT_APP_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
            -t ${{ steps.login-ecr.outputs.registry }}/carrot-frontend ./frontend
          docker push ${{ steps.login-ecr.outputs.registry }}/carrot-frontend

      # 4. 배포용 .env 파일 생성
      - name: Create .env file
        run: |
          echo "RDS_HOSTNAME=${{ secrets.RDS_HOSTNAME }}" > .env
          echo "RDS_USERNAME=${{ secrets.RDS_USERNAME }}" >> .env
          echo "RDS_PASSWORD=${{ secrets.RDS_PASSWORD }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}" >> .env
          echo "AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}" >> .env
          echo "EC2_HOST=${{ secrets.EC2_HOST }}" >> .env
          echo "AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}" >> .env
          echo "AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}" >> .env
          # ✅ CORS 허용 목록 추가 (백엔드 보안 해제)
          echo "APP_CORS_ALLOWED_ORIGINS=http://yellow.it.kr,http://yellow.it.kr:8080,http://3.36.13.76" >> .env

      # 5. S3로 배포 파일 업로드 (✅ nginx.conf 포함 확인)
      - name: zip and upload to S3
        run: |
          zip -r deploy.zip appspec.yml scripts/ docker-compose.yml .env nginx.conf
          aws s3 cp deploy.zip s3://${{ secrets.AWS_S3_BUCKET }}/deploy.zip

      # 6. CodeDeploy 실행
      - name: CodeDeploy
        run: |
          aws deploy create-deployment \
            --application-name carrot-warehouse-app \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --deployment-group-name carrot-warehouse-group \
            --s3-location bucket=${{ secrets.AWS_S3_BUCKET }},key=deploy.zip,bundleType=zip
