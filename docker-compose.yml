version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: carrot-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: restock_db
    ports:
      - "3309:3306"
    volumes:
      - ./db_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    container_name: carrot-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/restock_db?characterEncoding=UTF-8&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      AI_GOOGLE_GEMINI_API_KEY: ${GEMINI_API_KEY}
      AI_GOOGLE_GEMINI_URL: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
      FILE_UPLOAD_DIR: /app/uploads
      
      # ✅ 브라우저에서 오는 요청 허용
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:8080
        REACT_APP_IMAGE_URL: http://localhost:8080/uploads
        REACT_APP_GOOGLE_CLIENT_ID: ${REACT_APP_GOOGLE_CLIENT_ID}
        GENERATE_SOURCEMAP: "false"
    container_name: carrot-frontend
    restart: always
    ports:
      - "3000:80"
    volumes:
      # ✅ Nginx 설정 파일을 컨테이너에 연결 (수정 후 즉시 반영 가능)
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend