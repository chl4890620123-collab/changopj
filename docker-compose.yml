version: '3.8'

services:
  # 1. 백엔드 (RDS 연결)
  backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-northeast-2.amazonaws.com/carrot-backend:latest
    container_name: carrot-backend
    restart: always
    ports:
      - "8080:8080"
    # .env 파일의 모든 환경 변수를 로드합니다.
    env_file:
      - .env
    environment:
      # SSL 관련 보안 연결 오류를 해결하기 위해 파라미터를 추가했습니다.
      # useSSL=false와 allowPublicKeyRetrieval=true 등을 조합하여 접속을 시도합니다.
      SPRING_DATASOURCE_URL: jdbc:mariadb://${RDS_HOSTNAME}:3306/restock_db?characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&verifyServerCertificate=false
      SPRING_DATASOURCE_USERNAME: ${RDS_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${RDS_PASSWORD}
      
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      AI_GOOGLE_GEMINI_API_KEY: ${GEMINI_API_KEY}
      
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      
      # CORS 설정: EC2_HOST 변수가 .env에 정의되어 있어야 합니다.
      APP_CORS_ALLOWED_ORIGINS: http://${EC2_HOST},http://${EC2_HOST}:3000

  # 2. 프론트엔드
  frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-northeast-2.amazonaws.com/carrot-frontend:latest
    container_name: carrot-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    env_file:
      - .env
