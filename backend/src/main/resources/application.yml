version: '3.8'

services:
  # 1. 데이터베이스 설정 (MariaDB)
  db:
    image: mariadb:10.11
    container_name: carrot-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: restock_db
    ports:
      - "3309:3306"
    volumes:
      - ./db_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d

  # 2. 백엔드 설정 (Spring Boot)
  backend:
    build: ./backend
    container_name: carrot-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/restock_db?characterEncoding=UTF-8&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      
      # ✅ 에러 해결 핵심: 스프링의 'ai.google.gemini.api-key'와 매핑되도록 언더바 형식 추가
      AI_GOOGLE_GEMINI_API_KEY: ${GEMINI_API_KEY}
      
      REACT_APP_API_URL: http://localhost:3000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db

  # 3. 프론트엔드 설정 (React)
  frontend:
    build:
      context: ./frontend
      args:
        # ✅ 콜론(:) 뒤에 한 칸 띄우는 YAML 문법을 준수했습니다.
        REACT_APP_API_URL: ${REACT_APP_API_URL}
        REACT_APP_IMAGE_URL: ${REACT_APP_IMAGE_URL}
        REACT_APP_GOOGLE_CLIENT_ID: ${REACT_APP_GOOGLE_CLIENT_ID}
        GENERATE_SOURCEMAP: ${GENERATE_SOURCEMAP}
    container_name: carrot-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend