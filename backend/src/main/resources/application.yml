spring:
  profiles:
    active: prod # 기본 실행 프로필을 운영(prod)으로 설정

---
# ----------------------------------------------------------------
# 운영 환경 (Production) 설정
# ----------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: prod

  # ✅ [추가] 파일 업로드 용량 제한 설정 (400 에러 해결 핵심)
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB      # 파일 하나의 최대 크기
      max-request-size: 10MB   # 한 번의 요청에 포함된 전체 파일 크기

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${RDS_HOSTNAME}:3306/restock_db?characterEncoding=UTF-8&useSSL=true&trustServerCertificate=true
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  # Google OAuth 설정
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

# ----------------------------------------------------------------
# AWS & AI 설정 (S3 및 Gemini)
# ----------------------------------------------------------------
cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    stack:
      auto: false

# AI Gemini API Key (액션에서 주입받은 환경변수와 매핑)
ai:
  google:
    gemini:
      api-key: ${AI_GOOGLE_GEMINI_API_KEY}

# 업로드 경로 설정 (로컬 테스트용과 S3 구분 시 사용)
file:
  upload-dir: s3://${AWS_S3_BUCKET}/uploads
