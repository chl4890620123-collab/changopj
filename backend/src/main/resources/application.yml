spring:
  profiles:
    active: prod

---
spring:
  config:
    activate:
      on-profile: prod

  # ✅ 파일 업로드 용량 제한
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${RDS_HOSTNAME}:3306/restock_db?characterEncoding=UTF-8&useSSL=true&trustServerCertificate=true
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

# ✅ [수정] 최상위 계층 정렬 (spring: 과 같은 라인에 위치해야 함)
cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    stack:
      auto: false

ai:
  google:
    gemini:
      api-key: ${AI_GOOGLE_GEMINI_API_KEY}

# ✅ [수정 핵심] 도커 환경 변수를 우선적으로 읽도록 설정
# ${변수명:기본값} 형식을 사용해야 도커의 설정을 가져옵니다.
file:
  upload-dir: ${FILE_UPLOAD_DIR:/home/ubuntu/changopj/restokimg/}
