spring:
  profiles:
    active: prod # 기본 실행 프로필을 운영(prod)으로 설정

---
# ----------------------------------------------------------------
# 운영 환경 (Production) 설정
# ----------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # DB 주소, 계정 정보는 환경 변수로 주입받음
    driver-class-name: org.mariadb.jdbc.Driver
    # SSL 관련 파라미터(&useSSL=true&trustServerCertificate=true)를 추가했습니다.
    url: jdbc:mariadb://${RDS_HOSTNAME}:3306/restock_db?characterEncoding=UTF-8&useSSL=true&trustServerCertificate=true
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update # 운영 중 데이터 유지를 위해 update 또는 none 권장
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        # DB 연결 성공 후 Dialect를 찾지 못하는 상황을 방지하기 위해 명시적 추가를 권장합니다.
        dialect: org.hibernate.dialect.MariaDBDialect

  # Google OAuth 설정
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

# ----------------------------------------------------------------
# AWS & AI 설정 (S3 및 Gemini)
# ----------------------------------------------------------------
cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    stack:
      auto: false

# AI Gemini API Key (액션에서 주입받은 환경변수와 매핑)
ai:
  google:
    gemini:
      api-key: ${AI_GOOGLE_GEMINI_API_KEY}

# 업로드 경로 설정 (로컬 테스트용과 S3 구분 시 사용)
file:
  upload-dir: s3://${AWS_S3_BUCKET}/uploads
