spring:
  profiles:
    active: prod

---
spring:
  config:
    activate:
      on-profile: prod

  # ✅ 파일 업로드 용량 제한 (10MB)
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${RDS_HOSTNAME}:3306/restock_db?characterEncoding=UTF-8&useSSL=true&trustServerCertificate=true
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    stack:
      auto: false

ai:
  google:
    gemini:
      api-key: ${AI_GOOGLE_GEMINI_API_KEY}

# ✅ [수정] 도커에서 넘겨주는 FILE_UPLOAD_DIR 환경 변수를 사용합니다.
# 변수가 없을 경우 기본값으로 생성하신 폴더 경로를 사용합니다.
file:
  upload-dir: ${/home/ubuntu/changopj/restokimg}
