spring:
  profiles:
    active: prod

---
spring:
  config:
    activate:
      on-profile: prod

  # ✅ 파일 업로드 용량 제한 (10MB로 유지)
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${RDS_HOSTNAME}:3306/restock_db?characterEncoding=UTF-8&useSSL=true&trustServerCertificate=true
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    stack:
      auto: false

ai:
  google:
    gemini:
      api-key: ${AI_GOOGLE_GEMINI_API_KEY}

# ✅ [수정 핵심] 생성하신 실제 폴더 경로로 지정합니다.
# 도커 컨테이너 내부에서도 이 경로를 사용할 수 있도록 /home/ubuntu/changopj/restokimg 로 지정하거나,
# 도커 볼륨 설정이 되어 있다면 해당 마운트 경로를 적어야 합니다.
file:
  upload-dir: /home/ubuntu/changopj/restokimg
